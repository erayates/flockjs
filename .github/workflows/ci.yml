name: CI

on:
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  typecheck:
    name: Typecheck
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.11.0

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Verify workspace tsconfig inheritance
        run: pnpm run verify:tsconfig-extends

      - name: Workspace typecheck (Turbo)
        run: pnpm run typecheck

      - name: Root typecheck
        run: pnpm run typecheck:root
